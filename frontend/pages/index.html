<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИДО: Учёт квалификаций</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        
        .search-panel {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .search-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        
        .btn-primary {
            background-color: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2980b9;
        }
        
        .btn-success {
            background-color: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background-color: #219a52;
        }
        
        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
        
        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #c0392b;
        }
        
        .action-panel {
            background: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .results-panel {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        tr:hover {
            background-color: #f5f6fa;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-1 { background-color: #3498db; color: white; }
        .status-2 { background-color: #f39c12; color: white; }
        .status-3 { background-color: #27ae60; color: white; }
        .status-4 { background-color: #e74c3c; color: white; }
        .status-5 { background-color: #95a5a6; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        
        .modal-header h2 {
            font-size: 20px;
            color: #2c3e50;
        }
        
        .close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }
        
        .close:hover {
            color: #333;
        }
        
        .student-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .student-info h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .actions-cell {
            display: flex;
            gap: 5px;
        }
        
        .actions-cell button {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .search-results {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        
        .search-result-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        
        .search-result-item:hover {
            background-color: #f5f6fa;
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        .filters-panel {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: none;
        }
        
        .filters-panel.active {
            display: block;
        }
        
        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .checkbox-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .error-message {
            background-color: #fee;
            color: #c0392b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 4px solid #e74c3c;
        }
        
        .success-message {
            background-color: #efe;
            color: #27ae60;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 4px solid #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 ИДО: Учёт дополнительных квалификаций</h1>
        </header>
        
        <!-- Панель поиска студента -->
        <div class="search-panel">
            <div class="search-row">
                <div class="form-group" style="position: relative;">
                    <label for="studentSearch">Поиск студента (ФИО / Зачётка)</label>
                    <input type="text" id="studentSearch" placeholder="Начните вводить ФИО или номер зачётки...">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="form-group">
                    <label for="facultyFilter">Факультет</label>
                    <select id="facultyFilter">
                        <option value="">Все факультеты</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="openStudentCard()">Открыть карточку</button>
            </div>
        </div>
        
        <!-- Панель действий -->
        <div class="action-panel">
            <button class="btn btn-success" onclick="showFiltersPanel()">📊 Фильтры отчёта</button>
            <button class="btn btn-primary" onclick="loadReportData()">🔄 Обновить</button>
            <button class="btn btn-secondary" onclick="exportReport('xlsx')">📥 Экспорт XLSX</button>
            <button class="btn btn-secondary" onclick="exportReport('csv')">📥 Экспорт CSV</button>
        </div>
        
        <!-- Панель фильтров -->
        <div id="filtersPanel" class="filters-panel">
            <h3 style="margin-bottom: 15px;">Фильтры отчёта</h3>
            <div class="filter-row">
                <div class="form-group">
                    <label>Дата с</label>
                    <input type="date" id="filterDateFrom">
                </div>
                <div class="form-group">
                    <label>Дата по</label>
                    <input type="date" id="filterDateTo">
                </div>
                <div class="form-group">
                    <label>Тип программы</label>
                    <select id="filterType" multiple style="height: 80px;">
                        <option value="1">Повышение квалификации</option>
                        <option value="2">Профессиональная переподготовка</option>
                        <option value="3">Профессиональное обучение</option>
                        <option value="4">Тематические курсы</option>
                        <option value="5">Адаптационные программы</option>
                        <option value="6">Микроквалификация</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="form-group">
                    <label>Статус</label>
                    <div class="checkbox-group" id="statusFilters">
                        <label><input type="checkbox" value="1" checked> Записан</label>
                        <label><input type="checkbox" value="2" checked> В процессе</label>
                        <label><input type="checkbox" value="3" checked> Завершил</label>
                        <label><input type="checkbox" value="4"> Не завершил</label>
                        <label><input type="checkbox" value="5"> Отчислен</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Наличие документа</label>
                    <select id="filterHasDocument">
                        <option value="">Любой</option>
                        <option value="1">Есть документ</option>
                        <option value="0">Нет документа</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="loadReportData()">Применить фильтры</button>
            <button class="btn btn-secondary" onclick="resetFilters()">Сбросить</button>
        </div>
        
        <!-- Результаты отчёта -->
        <div class="results-panel">
            <h2 style="margin-bottom: 15px;">Данные отчёта</h2>
            <div id="reportContent">
                <div class="loading">Загрузка данных...</div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно карточки студента -->
    <div id="studentCardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Карточка студента</h2>
                <span class="close" onclick="closeModal('studentCardModal')">&times;</span>
            </div>
            <div id="studentInfo" class="student-info"></div>
            <div style="margin-bottom: 15px;">
                <button class="btn btn-success" onclick="openAddProgramForm()">+ Добавить программу</button>
            </div>
            <div id="studentProgramsList"></div>
        </div>
    </div>
    
    <!-- Модальное окно добавления программы -->
    <div id="addProgramModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Добавление программы ИДО</h2>
                <span class="close" onclick="closeModal('addProgramModal')">&times;</span>
            </div>
            <form id="addProgramForm" onsubmit="saveStudentProgram(event)">
                <input type="hidden" id="programStudId">
                <input type="hidden" id="programPersonId">
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Программа *</label>
                    <select id="programSelect" required>
                        <option value="">Выберите программу</option>
                    </select>
                </div>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Статус *</label>
                    <select id="programStatus" required>
                        <option value="1">Записан</option>
                        <option value="2">В процессе</option>
                        <option value="3">Успешно завершил</option>
                        <option value="4">Не завершил</option>
                        <option value="5">Отчислен</option>
                    </select>
                </div>
                
                <div class="filter-row">
                    <div class="form-group">
                        <label>Дата начала</label>
                        <input type="date" id="programStartDate">
                    </div>
                    <div class="form-group">
                        <label>Дата окончания</label>
                        <input type="date" id="programEndDate">
                    </div>
                </div>
                
                <div class="filter-row" style="margin-top: 15px;">
                    <div class="form-group">
                        <label>Номер документа</label>
                        <input type="text" id="programDocNumber">
                    </div>
                    <div class="form-group">
                        <label>Дата выдачи</label>
                        <input type="date" id="programDocDate">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label>Комментарий</label>
                    <textarea id="programComment" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addProgramModal')">Отмена</button>
                    <button type="submit" class="btn btn-success">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="ido-app.js"></script>
</body>
</html>
